name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Web — type check + tests + lint
  # ─────────────────────────────────────────────
  web:
    name: Web (type-check · tests · lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Vitest needs these to be present even if not connecting to real services.
      # Real secrets live in GitHub Actions secrets — these are CI-safe dummies.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_SECRET: ci-secret-not-used-in-unit-tests
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Disable telemetry
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run --reporter=verbose

      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────
  # Job 2: Mobile — type check only
  # (Expo tests added in Phase 4 when screens are built)
  # ─────────────────────────────────────────────
  mobile:
    name: Mobile (type-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Job 3: Shared package — type check
  # ─────────────────────────────────────────────
  shared:
    name: Shared package (type-check)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: packages/shared

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/shared/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Job 4: Vercel preview deploy
  # Only runs on PRs (not on pushes to main — that's handled by production.yml).
  # Waits for all checks to pass, then deploys a preview and posts the URL.
  # ─────────────────────────────────────────────
  preview:
    name: Preview deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only deploy previews for pull requests, not direct pushes to main
    if: github.event_name == 'pull_request'
    # Only deploy after all quality gates pass
    needs: [web, mobile, shared]

    permissions:
      pull-requests: write  # needed to post the URL comment

    env:
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Post preview URL as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.url }}';
            const sha        = context.sha.slice(0, 7);
            const actor      = context.actor;
            const body = [
              '## \u1F680 Preview deployment ready',
              '',
              '| | |',
              '|---|---|',
              `| **URL** | ${previewUrl} |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Deployed by** | @${actor} |`,
              '',
              '### Quick smoke test',
              `- [ ] [Homepage](${previewUrl}) loads`,
              `- [ ] [Search page](${previewUrl}/hostels) loads`,
              `- [ ] [Lahore city page](${previewUrl}/hostels/in/lahore) loads`,
              `- [ ] [Login page](${previewUrl}/login) loads`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' &&
                   c.body.includes('Preview deployment ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }