name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Web — type check + tests + lint
  # ─────────────────────────────────────────────
  web:
    name: Web (type-check · tests · lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Vitest needs these to be present even if not connecting to real services.
      # Real secrets live in GitHub Actions secrets — these are CI-safe dummies.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_SECRET: ci-secret-not-used-in-unit-tests
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Disable telemetry
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run --reporter=verbose

      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────
  # Job 2: Mobile — type check only
  # (Expo tests added in Phase 4 when screens are built)
  # ─────────────────────────────────────────────
  mobile:
    name: Mobile (type-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Job 3: Shared package — type check
  # ─────────────────────────────────────────────
  shared:
    name: Shared package (type-check)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: packages/shared

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/shared/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit